name: Bug report
description: Something is broken or doesn't work as documented
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Skill version
      description: Found in SKILL.md frontmatter `version:`
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: harness
    attributes:
      label: AI harness
      options:
        - Claude Code
        - Codex CLI
        - Cursor
        - Gemini CLI
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: mission
    attributes:
      label: Relevant mission.md (sanitized)
      description: Paste the relevant sections; redact anything sensitive.
